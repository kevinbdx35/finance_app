<!-- Modal: Nouvelle transaction -->
<div class="modal-backdrop" id="modal-add">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-add').classList.remove('open')">✕</button>
    <div class="modal-title">Nouvelle transaction</div>
    <form method="POST" action="{{ url_for('add_transaction') }}" enctype="multipart/form-data" id="form-add">
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="toggle-type" id="toggle-add">
          <button type="button" class="active-income" onclick="setType('add','income')">Entrée</button>
          <button type="button" onclick="setType('add','expense')">Sortie</button>
        </div>
        <input type="hidden" name="type" id="type-add" value="income">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" name="date" class="form-control" required
            value="{{ today if today else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Montant ({{ currency }})</label>
          <input type="number" name="amount" class="form-control" step="0.01" min="0" required placeholder="0.00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Libellé</label>
        <input type="text" name="label" class="form-control" required placeholder="Description de la transaction">
      </div>
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select name="category_id" class="form-control">
          <option value="">— Sélectionner —</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" placeholder="Informations complémentaires..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Pièce jointe (PDF, image)</label>
        <div class="dropzone" id="dropzone-add" onclick="document.getElementById('file-add').click()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 6px;display:block;"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          <span id="dropzone-add-label">Cliquez ou déposez un fichier ici</span>
          <input type="file" name="attachment" id="file-add" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp"
            onchange="updateDropzone('add', this)">
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button type="button" class="btn btn-outline" onclick="document.getElementById('modal-add').classList.remove('open')">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Édition transaction -->
<div class="modal-backdrop" id="modal-edit">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-edit').classList.remove('open')">✕</button>
    <div class="modal-title">Modifier la transaction</div>
    <form method="POST" id="form-edit" enctype="multipart/form-data">
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="toggle-type" id="toggle-edit">
          <button type="button" onclick="setType('edit','income')" id="btn-edit-income">Entrée</button>
          <button type="button" onclick="setType('edit','expense')" id="btn-edit-expense">Sortie</button>
        </div>
        <input type="hidden" name="type" id="type-edit" value="income">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" name="date" id="edit-date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Montant ({{ currency }})</label>
          <input type="number" name="amount" id="edit-amount" class="form-control" step="0.01" min="0" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Libellé</label>
        <input type="text" name="label" id="edit-label" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select name="category_id" id="edit-category" class="form-control">
          <option value="">— Sélectionner —</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea name="notes" id="edit-notes" class="form-control"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Pièce jointe</label>
        <div class="dropzone" id="dropzone-edit" onclick="document.getElementById('file-edit').click()">
          <span id="dropzone-edit-label">Cliquez pour remplacer le fichier</span>
          <input type="file" name="attachment" id="file-edit" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp"
            onchange="updateDropzone('edit', this)">
        </div>
        <div id="current-attachment" style="margin-top:6px;font-size:11px;color:var(--text2);"></div>
        <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;color:var(--text2);cursor:pointer;">
          <input type="checkbox" name="remove_attachment" value="1" id="remove-attachment">
          Supprimer la pièce jointe actuelle
        </label>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button type="button" class="btn btn-outline" onclick="document.getElementById('modal-edit').classList.remove('open')">Annuler</button>
        <button type="submit" class="btn btn-primary">Mettre à jour</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Suppression transaction -->
<div class="modal-backdrop" id="modal-delete">
  <div class="modal" style="max-width:400px;">
    <button class="modal-close" onclick="document.getElementById('modal-delete').classList.remove('open')">✕</button>
    <div class="modal-title">Supprimer la transaction</div>
    <p style="color:var(--text2);margin-bottom:20px;">Cette action est irréversible. La pièce jointe associée sera également supprimée.</p>
    <form method="POST" id="form-delete">
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="btn btn-outline" onclick="document.getElementById('modal-delete').classList.remove('open')">Annuler</button>
        <button type="submit" class="btn btn-danger">Supprimer</button>
      </div>
    </form>
  </div>
</div>

<script>
// Set today date on add modal open
document.querySelector('#modal-add input[name="date"]').value = new Date().toISOString().split('T')[0];

function setType(form, type) {
  document.getElementById('type-' + form).value = type;
  const btns = document.querySelectorAll('#toggle-' + form + ' button');
  btns.forEach((b, i) => {
    b.className = '';
    if (i === 0 && type === 'income') b.className = 'active-income';
    if (i === 1 && type === 'expense') b.className = 'active-expense';
  });
}

function updateDropzone(form, input) {
  const label = document.getElementById('dropzone-' + form + '-label');
  if (input.files && input.files[0]) {
    label.textContent = '📎 ' + input.files[0].name;
  }
}

function openEditModal(id) {
  fetch('/api/transaction/' + id)
    .then(r => r.json())
    .then(tx => {
      document.getElementById('form-edit').action = '/transactions/' + id + '/edit';
      document.getElementById('edit-date').value = tx.date;
      document.getElementById('edit-amount').value = tx.amount;
      document.getElementById('edit-label').value = tx.label;
      document.getElementById('edit-notes').value = tx.notes || '';
      document.getElementById('edit-category').value = tx.category_id || '';
      setType('edit', tx.type);
      const attDiv = document.getElementById('current-attachment');
      attDiv.textContent = tx.attachment_path ? 'Fichier actuel : ' + tx.attachment_path : 'Aucune pièce jointe';
      document.getElementById('remove-attachment').checked = false;
      document.getElementById('modal-edit').classList.add('open');
    });
}

function openDeleteModal(id) {
  document.getElementById('form-delete').action = '/transactions/' + id + '/delete';
  document.getElementById('modal-delete').classList.add('open');
}

// Dropzone drag events
['add', 'edit'].forEach(form => {
  const dz = document.getElementById('dropzone-' + form);
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const input = document.getElementById('file-' + form);
    input.files = e.dataTransfer.files;
    updateDropzone(form, input);
  });
});
</script>
